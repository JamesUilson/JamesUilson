name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"  # har 12 soatda ishga tushadi
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repo’ni checkout qilamiz
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Snake diagram generatsiya qilamiz
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JamesUilson
          outputs: |
            dist/github-contribution-grid-snake.svg

      # 3️⃣ Output branch ga push qilamiz PAT orqali
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}   # ✅ PAT ishlatiladi
          publish_dir: ./dist
          target_branch: output
